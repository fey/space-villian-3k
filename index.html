<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/style.css">

    <title>space-villian-3k</title>
  </head>
  <body>
    <h1>space-villian-3k</h1>
    <div class="game" id="game">
      <div class="main-content">
        <div class="entity player-stats" id="player">
          <h3>Player</h3>
          <div class="stat" id="player-health">HP: 40 / 40</div>
          <div class="stat" id="player-energy">Energy: 30</div>
          <div class="stat" id ="player-ap">Attack: 10</div>
        </div>

        <div class="battle-log">
          <h3>Battle Log</h3>
          <ul class="log-content" id="log-content">
          </ul>
        </div>

        <div class="entity villian-stats" id="villian">
          <h3>Villain</h3>
          <div class="stat" id="villian-health">HP: 60 / 60</div>
          <div class="stat" id="villian-energy">Energy: 0</div>
          <div class="stat" id="villian-ap">Attack: 15</div>
        </div>
      </div>

      <div class="actions">
        <button id="attack">Attack</button>
        <button id="heal">Heal</button>
        <button id="charge">Charge</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
